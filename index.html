<!DOCTYPE html>
<html lang="en">

<!--INCLUDE FETCH API AND DO THAT FIRST, do not do the calculation portion first as it will take you a long time.-->


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script defer src="chart.js"></script>
</head>

<body>
    <header>
        <h1>Let's Get Budgeting.</h1>
        <img src="/imgs/logo.png" alt="EECU logo">
    </header>
    <main>
        <article>
            <div id="inputs">
                <article class="career">
                    <h3>What is your career?</h3>
                    <select id="career">
                        <option>Select Career</option>
                    </select>
                    <img src="/imgs/search.png" alt="search" id="find">
                    <button><img src="/imgs/info.png" alt="info"></button>
                </article>
    
                <section class="edu">
                    <h3 class="Education">How much do you spend on your education?</h3>
                    <span>$</span>
                    <input type="number" id="edu" placeholder="Enter the amount here...">
                    <img src="/imgs/search.png" alt="search" id="find">
                    <button><img src="/imgs/info.png" alt="info"></button>
                </section>
    
                <section class="housing">
                    <h3 class="Housing"></h3>>How much do you spend on housing?</h3>
                    <span>$</span>
                    <input type="number" id="housing" placeholder="Enter the amount here...">
                    <img src="/imgs/search.png" alt="search" id="find">
                    <button><img src="/imgs/info.png" alt="info"></button>
                </section>
    
                <section class="ess">
                    <h3 class="Essentials"></h3>>How much do you spend on essentials?</h3>
                    <span>$</span>
                    <input type="number" id="ess" placeholder="Enter the amount here...">
                    <img src="/imgs/search.png" alt="search" id="find">
                    <button><img src="/imgs/info.png" alt="info"></button>
                </section>
    
                <section class="life">
                    <h3 class="Lifestyle"></h3>>What are your lifestyle expenses?</h3>
                    <!--Changed up the wording for this one a little becuase it was getting repetetive-->
                    <span>$</span>
                    <input type="number" id="life" placeholder="Enter the amount here...">
                    <img src="/imgs/search.png" alt="search" id="find">
                    <button><img src="/imgs/info.png" alt="info"></button>
                </section>
    
                <section class="save">
                    <h3 class="Savings"></h3>>How much do you save a month?</h3>
                    <span>$</span>
                    <input type="number" id="savings" placeholder="Enter the amount here...">
                    <img src="/imgs/search.png" alt="search" id="find">
                    <button><img src="/imgs/info.png" alt="info"></button>
                </section>
            </div>
        </article>
    
        <canvas id="pie"></canvas>
    
    </main>
    
</body>

</html>
